\* TLC configuration for RebarSupervisor.tla
\* State space: 3 children x MaxPid=10 x MaxRestarts=2 ~ 160,000 states
\* Run: tlc MCRebarSupervisor -config MCRebarSupervisor.cfg -workers 4

CONSTANT Children    = {0, 1, 2}
CONSTANT MaxPid      = 10
CONSTANT MaxRestarts = 2
CONSTANT Strategy    = "OneForOne"
CONSTANT None        = 0

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT NoDoubleLiveChild
INVARIANT StaleExitSafety
INVARIANT RestartLimitRespected
INVARIANT PIDMonotonicity
INVARIANT NoRestartAfterShutdown

\* Liveness
PROPERTY ChildEventuallyRestarted
PROPERTY QueueEventuallyDrains

CONSTRAINT MCStateConstraint

CHECK_DEADLOCK FALSE
SPECIFICATION Spec
