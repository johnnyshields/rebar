\* TLC configuration for RebarSwim.tla
\* State space: 3 nodes x MaxInc=3 ~ 500,000 states (with symmetry ~2 min)
\* Run: tlc MCRebarSwim -config RebarSwim.cfg -workers 4

CONSTANT Nodes  = {1, 2, 3}
CONSTANT MaxInc = 3

\* Symmetry reduction (disable if checking liveness properties)
SYMMETRY NodeSymmetry

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT AliveNodeNotPermanentlyDead
INVARIANT MutualSuspicionCanResolve

\* Temporal / action properties
PROPERTY DeadIsTerminal
PROPERTY IncarnationMonotonicity

CONSTRAINT MCStateConstraint

CHECK_DEADLOCK FALSE
SPECIFICATION Spec
