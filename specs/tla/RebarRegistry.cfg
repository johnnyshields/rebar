\* TLC configuration for RebarRegistry.tla
\* State space: 2 nodes x 3 tags x 2 timestamps ~ 8,000 states
\* Run: tlc MCRebarRegistry -config RebarRegistry.cfg -workers 4

CONSTANT Nodes        = {1, 2}
CONSTANT Names        = {"a", "b", "c"}
CONSTANT Tags         = {t1, t2, t3}
CONSTANT MaxTimestamp = 2

\* Symmetry reduction (disable if liveness properties are added)
SYMMETRY NodeSymmetry

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT NoTombstoneResurrection
INVARIANT LWWDeterminism
INVARIANT ConvergenceAfterFullExchange
INVARIANT TombstoneBeforeAdd

CONSTRAINT MCStateConstraint

CHECK_DEADLOCK FALSE
SPECIFICATION Spec
