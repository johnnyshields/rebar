\* TLC configuration for RebarSupervisor.tla (OneForAll strategy)
\* State space: 3 children x MaxPid=10 x MaxRestarts=2
\* Run: tlc RebarSupervisor -config RebarSupervisor-OneForAll.cfg -workers 4

CONSTANT Children    = {0, 1, 2}
CONSTANT MaxPid      = 10
CONSTANT MaxRestarts = 2
CONSTANT Strategy    = "OneForAll"
CONSTANT None        = 0

\* Safety invariants
INVARIANT TypeInvariant
INVARIANT NoDoubleLiveChild
INVARIANT NoPIDSharing
INVARIANT RestartLimitRespected
INVARIANT PIDMonotonicity
INVARIANT NoRestartAfterShutdown

\* Action properties
PROPERTY StaleExitSafety

\* Liveness
PROPERTY ChildEventuallyRestarted
PROPERTY QueueEventuallyDrains

CONSTRAINT MCStateConstraint

CHECK_DEADLOCK FALSE
SPECIFICATION Spec
