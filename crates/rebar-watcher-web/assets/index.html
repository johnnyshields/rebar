<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rebar Watcher</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Rebar Watcher</h1>
    <div id="status">
      <span id="connection-status" class="disconnected">Disconnected</span>
      <span id="process-count">0 processes</span>
    </div>
  </header>

  <nav>
    <button class="tab active" data-tab="tree">Supervision Tree</button>
    <button class="tab" data-tab="list">Process List</button>
    <button class="tab" data-tab="events">Event Log</button>
  </nav>

  <main>
    <section id="tab-tree" class="tab-content active">
      <div id="tree-container"></div>
    </section>

    <section id="tab-list" class="tab-content">
      <table id="process-table">
        <thead>
          <tr>
            <th data-sort="pid">PID</th>
            <th data-sort="name">Name</th>
            <th data-sort="parent">Parent</th>
            <th data-sort="uptime">Uptime</th>
            <th data-sort="type">Type</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="tab-events" class="tab-content">
      <div id="event-log"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
